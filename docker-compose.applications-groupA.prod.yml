# Application Services (Group A) — production environment.
# Uses pre-built images from the container registry with production tags.
# Usage: docker compose -f docker-compose.applications-groupA.prod.yml up -d

services:
  placeholder1-service:
    image: registry.example.com/lmbek-hobby-placeholder1-service:latest
    restart: always
    networks:
      - hobby-net

networks:
  hobby-net:
    driver: bridge
