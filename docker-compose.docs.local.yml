# Documentation — local environment.
# Builds from source for local development.
# Usage: docker compose -f docker-compose.docs.local.yml up -d --build

services:
  docs:
    image: lmbek-hobby-docs:latest
    build:
      context: ../docs
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - hobby-net

networks:
  hobby-net:
    external: true
    name: orchestrators_hobby-net
