# Application Services
# Builds from source for local development.
# Usage: docker compose -f docker-compose.applications.yml up -d --build

name: apps

services:
  placeholder1-service:
    image: lmbek-hobby-placeholder1-service:latest
    build:
      context: ../applications/placeholder1-service
      dockerfile: Dockerfile
    environment:
      - ENABLE_TRAFFIC_SIMULATOR=${ENABLE_TRAFFIC_SIMULATOR:-false}
    restart: unless-stopped
    networks:
      - hobby-internal

  placeholder2-service:
    image: lmbek-hobby-placeholder2-service:latest
    build:
      context: ../applications/placeholder2-service
      dockerfile: Dockerfile
    environment:
      - ENABLE_TRAFFIC_SIMULATOR=${ENABLE_TRAFFIC_SIMULATOR:-false}
    restart: unless-stopped
    networks:
      - hobby-internal

networks:
  hobby-internal:
    external: true
    name: hobby-internal
