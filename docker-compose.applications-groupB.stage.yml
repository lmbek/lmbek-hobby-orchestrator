# Application Services (Group B) — staging environment.
# Uses pre-built images from the container registry.
# Usage: docker compose -f docker-compose.applications-groupB.stage.yml up -d

services:
  placeholder2-service:
    image: registry.example.com/lmbek-hobby-placeholder2-service:stage
    restart: unless-stopped
    networks:
      - hobby-net

networks:
  hobby-net:
    driver: bridge
