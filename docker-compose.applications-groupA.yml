# Application Services (Group A)
# Builds from source for local development.
# Team A can run only their services without needing Group B.
# Usage: docker compose -f docker-compose.applications-groupA.yml up -d --build

name: group-a

services:
  placeholder1-service:
    image: lmbek-hobby-placeholder1-service:latest
    build:
      context: ../applications/placeholder1-service
      dockerfile: Dockerfile
    environment:
      - ENABLE_TRAFFIC_SIMULATOR=${ENABLE_TRAFFIC_SIMULATOR:-false}
    restart: unless-stopped
    networks:
      - hobby-internal

networks:
  hobby-internal:
    external: true
    name: hobby-internal
