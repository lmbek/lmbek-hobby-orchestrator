# Application Services (Group A) — staging environment.
# Uses pre-built images from the container registry.
# Usage: docker compose -f docker-compose.applications-groupA.stage.yml up -d

services:
  placeholder1-service:
    image: registry.example.com/lmbek-hobby-placeholder1-service:stage
    restart: unless-stopped
    networks:
      - hobby-net

networks:
  hobby-net:
    driver: bridge
