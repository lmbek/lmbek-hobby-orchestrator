# Application Services (Group B)
# Builds from source for local development.
# Team B can run only their services without needing Group A.
# Usage: docker compose -f docker-compose.applications-groupB.yml up -d --build

name: group-b

services:
  placeholder2-service:
    image: lmbek-hobby-placeholder2-service:latest
    build:
      context: ../applications/placeholder2-service
      dockerfile: Dockerfile
    environment:
      - ENABLE_TRAFFIC_SIMULATOR=${ENABLE_TRAFFIC_SIMULATOR:-false}
    restart: unless-stopped
    networks:
      - hobby-internal

networks:
  hobby-internal:
    external: true
    name: hobby-internal
