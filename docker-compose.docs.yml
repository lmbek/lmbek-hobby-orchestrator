# Documentation
# Local development with source mounting for live reload.
# Usage: docker compose -f docker-compose.docs.yml up -d

name: docs

services:
  docs:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../docs:/app
      - docs-node-modules:/app/node_modules
    command: sh -c "npm install && npx likec4 start --hostname 0.0.0.0 --port 80"
    restart: unless-stopped
    networks:
      - hobby-internal

volumes:
  docs-node-modules:

networks:
  hobby-internal:
    external: true
    name: hobby-internal
