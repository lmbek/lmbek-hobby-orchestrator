# Reverse Proxy (Traefik) — local environment only.
# Routes all incoming traffic to the appropriate service.
# Usage: docker compose -f docker-compose.proxy.local.yml up -d

services:
  proxy:
    image: traefik:v3.4
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./proxy/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./proxy/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - hobby-net

  proxy-homepage:
    image: nginx:alpine
    volumes:
      - ./proxy/homepage:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - hobby-net

networks:
  hobby-net:
    driver: bridge
