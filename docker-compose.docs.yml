# Documentation
# Builds from source for local development.
# Usage: docker compose -f docker-compose.docs.yml up -d --build

name: docs

services:
  docs:
    image: lmbek-hobby-docs:latest
    build:
      context: ../docs
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - hobby-internal

networks:
  hobby-internal:
    external: true
    name: hobby-internal
