# Traefik static configuration
entryPoints:
  web:
    address: ":80"
  metrics:
    address: ":8082"

api:
  dashboard: true
  insecure: true

providers:
  docker:
    exposedByDefault: false
    network: hobby-internal
  file:
    filename: /etc/traefik/dynamic.yml

metrics:
  prometheus:
    entryPoint: metrics

accessLog: {}
