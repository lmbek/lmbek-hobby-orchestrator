# Reverse Proxy (Traefik)
# Routes all incoming traffic to the appropriate service.
# Usage: docker compose -f docker-compose.proxy.yml up -d

name: proxy

services:
  proxy:
    image: traefik:v3.6
    ports:
      - "80:80"
      - "8082:8082"
    volumes:
      - ./proxy/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./proxy/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - hobby-internal
      - hobby-external

  proxy-homepage:
    image: nginx:alpine
    volumes:
      - ./proxy/homepage:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - hobby-internal

networks:
  hobby-internal:
    name: hobby-internal
    external: true
  hobby-external:
    name: hobby-external
    external: true
