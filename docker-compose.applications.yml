# Application Services
# Local development with source mounting for live reload.
# Usage: docker compose -f docker-compose.applications.yml up -d

name: apps

services:
  placeholder1-service:
    image: golang:1.26-alpine
    working_dir: /app
    volumes:
      - ../applications/placeholder1-service:/app
    command: go run .
    environment:
      - ENABLE_TRAFFIC_SIMULATOR=${ENABLE_TRAFFIC_SIMULATOR:-false}
    restart: unless-stopped
    networks:
      - hobby-internal

  placeholder2-service:
    image: golang:1.26-alpine
    working_dir: /app
    volumes:
      - ../applications/placeholder2-service:/app
    command: go run .
    environment:
      - ENABLE_TRAFFIC_SIMULATOR=${ENABLE_TRAFFIC_SIMULATOR:-false}
    restart: unless-stopped
    networks:
      - hobby-internal

networks:
  hobby-internal:
    external: true
    name: hobby-internal
